<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPSLS</title>
    <style>
        body {
            /* min-height: 100vh; */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            text-align: center;
            font-size: 40px;
            margin-bottom: 30px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            margin-top: 20px;

        }

        td {
            width: 100px;
            height: 100px;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            vertical-align: middle;
            border: 2px solid black;
            user-select: none;
        }

        td:hover {
            background-color: lightgray;
        }

        #status {
            text-align: center;
            font-size: 20px;
            margin: 20px;
        }


        button {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Rock-Paper-Scissors-Lizard-Spock</h1>
    <p id="status">Welcome!</p>
    <table>
        <thead>

            <td>Human</td>
            <td>AI</td>
  
        </thead>
        <tbody>
            <td id="humanChoice"></td><!--User Input-->
            <td id="computerChoice"></td><!--Computer Input-->
        </tbody>
    </table>
    <p id="count">Game Count = </p>
    <div id="options">
        <button>Rock</button>
        <button>Paper</button>
        <button>Scissors</button>
        <button>Lizard</button>
        <button>Spock</button>
    </div>
    <button>Reset</button>







    <script src="nlogic.js"></script>
    <script src="script.js"></script>
</body>

</html>
