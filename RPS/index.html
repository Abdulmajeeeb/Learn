<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPSLS</title>
    <style>
        body {
            /* min-height: 100vh; */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            text-align: center;
            font-size: 40px;
            margin-bottom: 30px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            margin-top: 20px;

        }

        td {
            width: 100px;
            height: 100px;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            vertical-align: middle;
            border: 2px solid black;
            user-select: none;
        }

        td:hover {
            background-color: lightgray;
        }

        #status {
            text-align: center;
            font-size: 20px;
            margin: 20px;
        }


        button {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Rock-Paper-Scissors-Lizard-Spock</h1>
    <div>
        <h2>Rules:</h2>
        <p>Scissors cuts Paper</p>
        <p>Paper covers Rock</p>
        <p>Rock crushes Lizard</p>
        <p>Lizard poisons Spock</p>
        <p>Spock smashes Scissors</p>
        <p>Scissors decapitates Lizard</p>
        <p>Lizard eats Paper</p>
        <p>Paper disproves Spock</p>
        <p>Spock vaporizes Rock</p>
        <p>Rock crushes Scissors</p>
    </div>
    <div id="rounds">
        <button data-round="3">Best of 3</button>
        <button data-round="5">Best of 5</button>
        <button data-round="7">Best of 7</button>
        <button data-round="999">Unlimited</button>
    </div>
    <script>
let maxRounds;
const rounds = document.querySelectorAll("#rounds button");
for (const button of rounds) {
    button.addEventListener("click", function () {
//        maxRounds=button.dataset.round;
        window.location.href=`rps.html?round=${button.dataset.round}`;
    })
}
</script>
</body>

</html>
