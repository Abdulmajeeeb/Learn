<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
h1 {
    text-align: center;
    font-size: 40px;
    margin-bottom: 30px;
}
        table{
            margin: auto;
            border-collapse: collapse;
            margin-top: 20px;            
        }
        td{
            width: 100px;
            height: 100px;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            vertical-align: middle;
            border: 2px solid black;
            user-select: none;
        }
        td:hover {
    background-color: lightgray;
}
#status {
    text-align: center;
    font-size: 20px;
    margin: 20px;
}
#newGame {
    margin-top: 25px;
    padding: 12px 24px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background-color: #007BFF;
    color: white;
    cursor: pointer;
}
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <p id="status">Current Player: ?</p>   
    <div>
        <table>
            <tbody>
                <tr>
                    <td class="cell" data-row="0" data-col="0"></td>
                    <td class="cell" data-row="0" data-col="1"></td>
                    <td class="cell" data-row="0" data-col="2"></td>
                </tr>
                <tr>
                    <td class="cell" data-row="1" data-col="0"></td>
                    <td class="cell" data-row="1" data-col="1"></td>
                    <td class="cell" data-row="1" data-col="2"></td>
                </tr>
                <tr>
                    <td class="cell" data-row="2" data-col="0"></td>
                    <td class="cell" data-row="2" data-col="1"></td>
                    <td class="cell" data-row="2" data-col="2"></td>
                </tr>
            </tbody>
        </table>
    </div>
    <button id="newGame"onclick="restartGame()">New Game</button>



    <script src="gameLogic.js"></script>
    <script src="script.js"></script>
</body>
</html>
