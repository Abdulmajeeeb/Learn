<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        h1 {
            text-align: center;
            font-size: 40px;
            margin-bottom: 30px;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.3);
            color: white;
        }

        table {
            margin: 30px auto;
            border-collapse: separate;
            border-spacing: 12px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.28);
            box-shadow:
                0 10px 30px rgba(0, 0, 0, .25),
                inset 0 0 15px rgba(255, 255, 255, .05);
            transition: 0.3s;
        }

        table:hover {
            transform: rotateX(2deg);
        }

        .cell {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 16px;
            text-align: center;
            vertical-align: middle;
            font-size: 42px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .cell:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 255, 255, .18);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .25);
        }

        .X {
    color: #073cb8;
    text-shadow: 0 0 8px rgba(255,255,255,.4);
            animation: pop 0.25s ease;
        }

        .O {
            color: #fb7185;
            text-shadow: 0 0 12px rgba(251, 113, 133, 0.8);
            animation: pop 0.25s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }

            70% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
                background: rgba(255, 255, 255, 0.15);
            }

            20% {
                transform: translateX(-6px);
                background: rgba(255, 80, 80, 0.45);
            }

            40% {
                transform: translateX(6px);
                background: rgba(255, 80, 80, 0.45);
            }

            60% {
                transform: translateX(-6px);
                background: rgba(255, 80, 80, 0.45);
            }

            80% {
                transform: translateX(6px);
                background: rgba(255, 80, 80, 0.45);
            }

            100% {
                transform: translateX(0);
                background: rgba(255, 255, 255, 0.15);
            }
        }

        .shake {
            animation: shake 0.3s;
        }

        #status {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin: 20px;
            color: white;
        }

        #newGame {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

        button {
            margin-top: 25px;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .25);
        }
    </style>
</head>

<body>

    <h1>Tic-Tac-Toe</h1>
    <p id="status"></p>
    <div>
        <table>
            <tbody id="gameBoard">
            </tbody>
        </table>
    </div>
    <div id="types">
        <button data-size="3">3 x 3</button>
        <button data-size="4">4 x 4</button>
        <button data-size="5">5 x 5</button>
        <button data-size="6">6 x 6</button>
        <button data-size="7">7 x 7</button>
    </div>
    <button id="newGame" onclick="restartGame()">New Game</button>



    <script src="gameLogic.js"></script>
    <script src="script.js"></script>
</body>

</html>
